version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: garage_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: garage_elite
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: garage_backend
    ports:
      - "8000:80"
    volumes:
      - ./backend/src:/var/www/html
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_DATABASE: garage_elite
      DB_USERNAME: root
      DB_PASSWORD: root
      APP_DEBUG: "true"

  frontend:
    build: ./frontend
    container_name: garage_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      REACT_APP_API_URL: http://localhost:8000/api

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: garage_phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - mysql

volumes:
  mysql_data: